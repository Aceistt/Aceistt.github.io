<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page not found · Terence</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <style>
    :root {
      --bg: #0b0e14; --text: #e6e9ef; --muted: #98a2b8;
      --accent: #6ea8fe; --accent-2: #b69dff; --accent-ink: #0b0e14;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center; text-align: center;
      padding: 2rem;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(closest-side at 50% 0%, rgba(110,168,254,0.18), transparent 70%),
        var(--bg);
      color: var(--text);
    }
    .code {
      font-size: clamp(5rem, 22vw, 11rem);
      font-weight: 800; line-height: 1; margin: 0;
      background: linear-gradient(135deg, var(--text), var(--accent) 70%, var(--accent-2));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    h1 { font-size: clamp(1.3rem, 4vw, 1.9rem); margin: 0.5rem 0 0.75rem; }
    p { color: var(--muted); max-width: 42ch; margin: 0 auto 2rem; }
    .btn {
      display: inline-block; padding: 0.8rem 1.6rem; border-radius: 999px;
      font-weight: 600; text-decoration: none; color: var(--accent-ink);
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 8px 24px rgba(110,168,254,0.25);
      transition: transform 0.15s ease;
    }
    .btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <main>
    <p class="code">404</p>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or may have moved.</p>
    <a class="btn" href="/">Back to home</a>
  </main>
</body>
</html>
