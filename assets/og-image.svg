<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Terence — Software Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0e14"/>
      <stop offset="1" stop-color="#131722"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ea8fe"/>
      <stop offset="1" stop-color="#b69dff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="70%">
      <stop offset="0" stop-color="#6ea8fe" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#6ea8fe" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- logo: geometric A with dot -->
  <rect x="90" y="92" width="92" height="92" rx="22" fill="url(#accent)"/>
  <g fill="none" stroke="#0b0e14" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <path d="M112 160 L136 116 L160 160"/>
    <path d="M122 144 L150 144"/>
  </g>
  <rect x="131" y="150" width="10" height="10" rx="2" transform="rotate(45 136 155)" fill="#0b0e14"/>

  <text x="92" y="330" font-family="Segoe UI, system-ui, Arial, sans-serif" font-size="120" font-weight="800" fill="#ffffff">Terence</text>
  <text x="96" y="410" font-family="Segoe UI, system-ui, Arial, sans-serif" font-size="48" font-weight="600" fill="url(#accent)">Software Developer</text>
  <text x="96" y="470" font-family="Segoe UI, system-ui, Arial, sans-serif" font-size="32" font-weight="400" fill="#98a2b8">C# · Python · React Native · Web</text>

  <text x="96" y="565" font-family="Segoe UI, system-ui, Arial, sans-serif" font-size="30" font-weight="600" fill="#6ea8fe">aceistt.github.io</text>
</svg>
